<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — Zeenat</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="announce"><strong>Free Shipping</strong> on orders above Rs. 2,000 &nbsp;|&nbsp; Since 2024</div>

<header class="site-header">
  <div class="header-inner">
    <button class="menu-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo">Zee<span>nat</span></a>
    <nav class="main-nav">
      <ul>
        <li><a href="shop.html?cat=earrings">Earrings</a></li>
        <li><a href="shop.html?cat=rings">Rings</a></li>
        <li><a href="shop.html?cat=pendants">Pendants</a></li>
        <li><a href="shop.html?cat=bracelets">Bracelets</a></li>
        <li><a href="shop.html?cat=sets">Sets</a></li>
        <li><a href="shop.html?cat=ethnic">Ethnic</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search jewellery...">
    </div>
    <div class="header-actions">
      <a href="cart.html" class="icon-btn" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" data-cart-count>0</span>
      </a>
    </div>
  </div>
</header>

<div class="page-head">
  <p class="breadcrumb"><a href="index.html">Home</a> / Cart</p>
  <h1>Your Cart</h1>
</div>

<div id="cartRoot"></div>

<footer class="site-footer" id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script>
  function renderCartPage() {
    const items = cartDetailed();
    const root = document.getElementById("cartRoot");

    if (items.length === 0) {
      root.innerHTML = `
        <div class="cart-empty">
          <h2>Your cart is empty</h2>
          <p>Kuch khoobsurat jewellery add karein aur wapas aayen!</p>
          <a href="shop.html" class="btn">Start Shopping</a>
        </div>`;
      return;
    }

    const itemsHTML = items.map(p => `
      <div class="cart-item" data-id="${p.id}">
        <div class="cart-item-media">${productImageHTML(p)}</div>
        <div>
          <p class="cart-item-cat">${categoryLabel(p.category)}</p>
          <a href="product.html?id=${p.id}" class="cart-item-name">${p.name}</a><br>
          <button class="cart-item-remove" onclick="removeFromCart(${p.id});renderCartPage();">Remove</button>
        </div>
        <div class="qty-control">
          <button type="button" onclick="setQty(${p.id}, ${p.qty - 1});renderCartPage();">−</button>
          <input type="text" value="${p.qty}" readonly>
          <button type="button" onclick="setQty(${p.id}, ${p.qty + 1});renderCartPage();">+</button>
        </div>
        <div class="cart-item-price">${CURRENCY}${(p.price * p.qty).toLocaleString()}</div>
      </div>
    `).join("");

    const total = cartTotal();
    const shipping = total >= 2000 ? 0 : 200;
    const grandTotal = total + shipping;

    const waLines = items.map(p => `• ${p.name} x${p.qty} — ${CURRENCY}${(p.price * p.qty).toLocaleString()}`).join("%0A");
    const waMsg = `Hi Zeenat! I'd like to order:%0A${waLines}%0A%0ATotal: ${CURRENCY}${grandTotal.toLocaleString()}`;
    const waHref = `https://wa.me/${WHATSAPP_NUMBER}?text=${waMsg}`;

    root.innerHTML = `
      <div class="cart-wrap">
        <div class="cart-items">${itemsHTML}</div>
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>${CURRENCY}${total.toLocaleString()}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? "Free" : CURRENCY + shipping}</span></div>
          <div class="summary-row total"><span>Total</span><span>${CURRENCY}${grandTotal.toLocaleString()}</span></div>
          <a href="${waHref}" target="_blank" rel="noopener" class="btn btn-block" style="margin-top:18px;">Checkout via WhatsApp</a>
          <a href="shop.html" class="btn btn-outline btn-block" style="margin-top:10px;">Continue Shopping</a>
          <p style="font-size:12px;color:#8a7c71;margin-top:14px;">Order confirm karne ke liye hum aapko WhatsApp par contact karenge — payment cash on delivery ya bank transfer se ho sakti hai.</p>
        </div>
      </div>
    `;
  }

  renderCartPage();
</script>
</body>
</html>
