<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pdTitle">Product — Zeenat</title>
<meta name="description" content="Shop premium artificial jewellery at Zeenat.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="announce"><strong>Free Shipping</strong> on orders above Rs. 2,000 &nbsp;|&nbsp; Since 2024</div>

<header class="site-header">
  <div class="header-inner">
    <button class="menu-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <a href="index.html" class="logo">Zee<span>nat</span></a>
    <nav class="main-nav">
      <ul>
        <li><a href="shop.html?cat=earrings">Earrings</a></li>
        <li><a href="shop.html?cat=rings">Rings</a></li>
        <li><a href="shop.html?cat=pendants">Pendants</a></li>
        <li><a href="shop.html?cat=bracelets">Bracelets</a></li>
        <li><a href="shop.html?cat=sets">Sets</a></li>
        <li><a href="shop.html?cat=ethnic">Ethnic</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search jewellery...">
    </div>
    <div class="header-actions">
      <a href="cart.html" class="icon-btn" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" data-cart-count>0</span>
      </a>
    </div>
  </div>
</header>

<div class="page-head" style="padding-bottom:0;">
  <p class="breadcrumb"><a href="index.html">Home</a> / <a href="shop.html" id="crumbCat">Shop</a> / <span id="crumbName">Product</span></p>
</div>

<div id="pdRoot"></div>

<section class="section" style="padding-top:0;">
  <div class="section-head">
    <p class="eyebrow">You May Also Like</p>
    <h2>Similar Pieces</h2>
  </div>
  <div class="grid" id="relatedGrid"></div>
</section>

<footer class="site-footer" id="footer"></footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/layout.js"></script>
<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  const id = parseInt(getParam("id"), 10);
  const product = PRODUCTS.find(p => p.id === id) || PRODUCTS[0];

  document.title = product.name + " — Zeenat";
  document.getElementById("pdTitle").textContent = product.name + " — Zeenat";
  document.getElementById("crumbCat").textContent = categoryLabel(product.category);
  document.getElementById("crumbCat").href = "shop.html?cat=" + product.category;
  document.getElementById("crumbName").textContent = product.name;

  const oldPriceHTML = product.oldPrice ? `<span class="price-old">${CURRENCY}${product.oldPrice.toLocaleString()}</span>` : "";
  const badgeHTML = product.badge ? `<span class="badge badge--${product.badge.toLowerCase()}">${product.badge}</span>` : "";

  document.getElementById("pdRoot").innerHTML = `
    <div class="pd">
      <div class="pd-media">${badgeHTML}${productImageHTML(product)}</div>
      <div class="pd-info">
        <p class="eyebrow">${categoryLabel(product.category)}</p>
        <h1>${product.name}</h1>
        <p class="pd-price">${CURRENCY}${product.price.toLocaleString()} ${oldPriceHTML}</p>
        <p class="pd-desc">${product.desc}</p>
        <div class="pd-qty">
          <span style="font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#5b4d44;">Quantity</span>
          <div class="qty-control">
            <button type="button" id="qtyMinus">−</button>
            <input type="text" id="qtyInput" value="1" readonly>
            <button type="button" id="qtyPlus">+</button>
          </div>
        </div>
        <div class="pd-actions">
          <button class="btn" id="addBtn">Add to Cart</button>
          <a class="btn btn-outline" id="waBtn" href="#" target="_blank" rel="noopener">Order on WhatsApp</a>
        </div>
        <div class="pd-meta">
          Nickel &amp; lead free · Anti-tarnish coating · Free shipping above Rs. 2,000 · 3-day exchange on unworn items
        </div>
      </div>
    </div>
  `;

  let qty = 1;
  const qtyInput = document.getElementById("qtyInput");
  document.getElementById("qtyMinus").addEventListener("click", () => { qty = Math.max(1, qty - 1); qtyInput.value = qty; });
  document.getElementById("qtyPlus").addEventListener("click", () => { qty += 1; qtyInput.value = qty; });
  document.getElementById("addBtn").addEventListener("click", () => addToCart(product.id, qty));

  const waMsg = encodeURIComponent(`Hi Zeenat! I'd like to order: ${product.name} (Qty: ${qty}) — ${CURRENCY}${product.price.toLocaleString()}`);
  document.getElementById("waBtn").href = `https://wa.me/${WHATSAPP_NUMBER}?text=${waMsg}`;

  const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
  renderGrid(document.getElementById("relatedGrid"), related.length ? related : PRODUCTS.filter(p => p.id !== product.id).slice(0, 4));
</script>
</body>
</html>
